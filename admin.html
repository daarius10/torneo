<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - La Liga de Maestros</title>
    <style>
        :root { 
            --primary: #00ff88; --primary-hover: #00cc6a; --bg-dark: #0f0f0f; 
            --card-bg: #1a1a1a; --text-main: #ffffff; --text-dim: #aaaaaa; --red: #ff4d4d; --yellow: #f1c40f; --border: #333;
        }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-main); }
        
        #login-container {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=2000'); 
            background-size: cover; background-position: center;
        }
        .login-card { background: rgba(26, 26, 26, 0.95); padding: 45px; border-radius: 12px; width: 100%; max-width: 380px; text-align: center; border: 1px solid rgba(0, 255, 136, 0.3); }
        .login-card h2 { color: var(--primary); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; }

        #panel { display: none; max-width: 1100px; margin: 40px auto; padding: 20px; }
        .admin-section { background: var(--card-bg); border-radius: 12px; padding: 25px; margin-bottom: 30px; border: 1px solid var(--border); }
        
        input[type="text"], input[type="password"], input[type="datetime-local"], textarea { width: 100%; padding: 12px; margin: 8px 0; background: #252525; border: 1px solid #444; border-radius: 8px; color: white; box-sizing: border-box; }
        
        /* Estilo de los números de goles/tarjetas */
        input[type="number"] { background: #000 !important; color: var(--primary) !important; border: 1px solid var(--primary) !important; border-radius: 5px; font-weight: bold; font-size: 15px; width: 42px; text-align: center; outline: none; padding: 4px; }

        .btn-main { background: var(--primary); color: #000; padding: 14px; width: 100%; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .btn-main:hover { background: var(--primary-hover); }

        .team-box { background: #222; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 15px; padding: 20px; position: relative; }
        .btn-del { background: none; border: none; color: var(--red); cursor: pointer; font-weight: bold; font-size: 18px; }
        
        /* Resalte de nombres en la lista de equipos */
        .player-tag { background: #333; color: var(--primary); padding: 6px 12px; border-radius: 20px; font-size: 13px; margin: 4px; display: inline-flex; align-items: center; border: 1px solid #444; font-weight: 600; }
        
        .match-edit { background: #1a1a1a; border: 1px solid var(--border); padding: 25px; margin: 20px 0; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* GRID DE JUGADORES CORREGIDO */
        .grid-header { display: grid; grid-template-columns: 1fr 45px 45px 45px 45px 45px; gap: 10px; font-size: 11px; font-weight: bold; text-align: center; color: var(--text-dim); padding-bottom: 10px; border-bottom: 1px solid #444; margin-bottom: 10px; }
        
        .player-goal-item { display: grid; grid-template-columns: 1fr 45px 45px 45px 45px 45px; align-items: center; gap: 10px; padding: 10px 5px; border-bottom: 1px solid #2a2a2a; transition: 0.2s; }
        .player-goal-item:hover { background: rgba(255,255,255,0.03); }

        /* NOMBRES RESALTADOS */
        .player-name-label { color: #fff; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 10px; }

        .score-display { width: 60px !important; font-size: 24px !important; height: 45px; background: #000; border: 2px solid var(--primary) !important; color: var(--primary) !important; }

        #filtros-jornada { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .btn-jornada { background: #333; color: white; border: 1px solid #444; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-jornada.active { background: var(--primary); color: black; border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 255, 136, 0.4); }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-card">
            <h2>Acceso Admin</h2>
            <input type="password" id="passInput" placeholder="Clave de Seguridad" onkeypress="if(event.key==='Enter') entrar()">
            <button class="btn-main" onclick="entrar()">Entrar al Sistema</button>
        </div>
    </div>

    <div id="panel">
        <h2 style="text-align:center; color: var(--primary); text-transform: uppercase; letter-spacing: 4px;">Administración - Liga de Maestros</h2>
        
        <div class="admin-section">
            <h3>NUEVO EQUIPO</h3>
            <input type="text" id="nameE" placeholder="Nombre del Equipo">
            <textarea id="playersE" placeholder="Jugadores (separados por comas: Juan, Pedro, Luis...)"></textarea>
            <button class="btn-main" onclick="addEquipo()">CREAR EQUIPO</button>
        </div>

        <div id="lista-equipos-admin"></div>

        <div class="admin-section">
            <h3 style="color: var(--primary);">GESTIÓN DE CALENDARIO</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button class="btn-main" style="flex:1; background: #222; color: var(--primary); border: 1px solid var(--primary);" onclick="generarTorneo()">Generar Todas las Jornadas</button>
            </div>
            <div id="filtros-jornada"></div>
            <div id="partidos-admin"></div>
        </div>
        
        <button style="background:transparent; border: 1px solid var(--red); color: var(--red); margin-top:50px;" class="btn-main" onclick="if(confirm('¿Borrar TODO el sistema?')){localStorage.clear(); location.reload();}">RESETEAR SISTEMA COMPLETO</button>
    </div>

<script src="js/admin_logic.js"></script>
</body>
</html>
